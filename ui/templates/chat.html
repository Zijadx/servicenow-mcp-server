<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Automatiki — ServiceNow Connector</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="chat-body">
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand-mark">A</span>
      <span class="brand-title">Automatiki — ServiceNow Connector</span>
      <span class="status-dot" id="statusDot" title="Authenticated"></span>
    </div>
    <div class="topbar-right">
      <span class="user-pill" id="userPill">{{ sn_user }}</span>
      <button id="logoutBtn" class="btn-ghost" title="Sign out">Sign out</button>
    </div>
  </header>

  <main class="chat-shell">
    <div id="messages" class="messages" aria-live="polite">
      <div class="msg msg-assistant">
        <div class="msg-bubble">
          Hi <strong>{{ sn_user }}</strong> — I'm connected to ServiceNow. Try one of these:
          <ul>
            <li><code>show me open P1 incidents</code></li>
            <li><code>who is admin</code></li>
            <li><code>what fields does the incident table have</code></li>
            <li><code>health check</code></li>
          </ul>
        </div>
      </div>
    </div>

    <form id="chatForm" class="composer">
      <textarea
        id="composerInput"
        rows="1"
        placeholder="Ask about incidents, users, schemas…"
        autocomplete="off"
        autofocus
      ></textarea>
      <button type="submit" id="sendBtn" class="btn-primary btn-send">
        <span class="btn-label">Send</span>
      </button>
    </form>
  </main>

  <script src="/static/chat.js"></script>
</body>
</html>
